<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>33 Reasons I Love You</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:auto;
}

h1{
text-align:center;
padding:20px;
font-size:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

.box{
background:rgba(255,255,255,0.1);
border-radius:12px;
padding:35px 0;
text-align:center;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

.box:hover{
background:rgba(255,255,255,0.25);
transform:scale(1.08);
}

.completed{
background:linear-gradient(135deg,#c9a227,#ffd700);
color:black;
box-shadow:0 0 15px rgba(255,215,0,0.7);
transform:scale(1.05);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
text-align:center;
padding:20px;
}

.modal h2{
margin-bottom:20px;
max-width:600px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#ff9800;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ffa726;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:10000;
}

.finalMessage{
font-size:28px;
text-align:center;
max-width:600px;
animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<h1>Tap Any Box ❤️</h1>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<h2 id="question"></h2>
<p id="waitMsg"></p>
<button id="answerBtn">Show Answer</button>
<h2 id="answer"></h2>
</div>

<canvas id="fireworks"></canvas>

<script>
// Questions and answers
const questions = [
"Why can’t skeletons fight each other? 💀",
"What do you call a factory that makes okay products? 🏭",
"Why did the bicycle fall over? 🚲",
"What do you call a sleeping bull? 🐂",
"Why did the stadium get hot after the game? 🏟",
"What’s orange and sounds like a parrot? 🥕",
"Why is dark spelled with a K? 🌙",
"What did one wall say to the other wall? 🧱",
"What do you call a pile of cats? 🐱",
"Why did the picture go to jail? 🖼",
"What do you call a sleeping pizza? 🍕",
"What is the hardest tea to swallow? ☕",
"Why did the computer gain weight? 💻",
"Why shouldn’t you fart in an Apple store? 🍎",
"What did 20 do when hungry? 🔢",
"What’s the coldest tea? ❄",
"What do you call a tiny ocean wave? 🌊",
"What do you call a cute door? 🚪",
"What has two butts but kills people? 🥷",
"Why did the math book look sad? 📘",
"Why did the mango sit alone? 🥭",
"Why did the chapati fail the race? 🫓",
"Why did chai break up with coffee? ☕",
"Why did jalebi get promoted? 🍥",
"Why did ladoo stay next to me? 🍬",
"What do you call masala dosa with feelings? 🥞",
"Why do ladoos never fight? 🍡",
"How does samosa apologize? 🥟",
"What do you call biryani with attitude? 🍛",
"How do idlis say I miss you? 🥥",
"Why did the rickshaw driver wave? 🚕",
"What’s better than 32 reasons to love you? ❤️",
"And what happens after 33 reasons? 🎂"
];

const answers = [
"They don’t have the guts.",
"A satisfactory.",
"It was two-tired.",
"A bulldozer.",
"Because all the fans left.",
"A carrot.",
"Because you can’t C in the dark.",
"I’ll meet you at the corner.",
"A meow-ntain.",
"Because it was framed.",
"A piZZZZa.",
"Reali-Tea.",
"It accepted too many cookies.",
"Because there are no Windows.",
"28 (twenty ate).",
"Ooty.",
"A microw-wave.",
"Adorable.",
"An assassin.",
"It had too many problems.",
"It didn’t want to get into a pickle.",
"It couldn’t roll fast enough.",
"It was too hot to handle.",
"It knew how to twist things.",
"Because life is sweeter with you.",
"Rolling in love.",
"Love is sweeter than arguments.",
"I was stuffed with emotions.",
"Extra masala.",
"By steaming quietly in your thoughts.",
"Because love deserves a hello.",
"33… because you get better every year.",
"The biggest reason of all… you’re my forever."
];

// Unique wait messages
const waitMessages = [
"Hold up babe 😎","Patience is sexy 😉","Think hard, my love 🧠","Not yet, handsome 😌",
"Almost there, keep smiling 😁","Wait a sec, you got this 💪","Easy tiger 🐯","Think of me 😘",
"Not so fast! 😏","Hold your horses 🐎","Pause, you’re too quick ⏳","Slow down, genius 🤓",
"Just 3 seconds more ⏱","Think of something spicy 🌶️","Almost… breathe 😌","Keep your eyes on the prize 👀",
"Not yet, my champ 🏆","Hold it, king 👑","Patience, my hero 💖","Wait baby… just wait 😘",
"Hold on, cutie pie 🥰","Think of our adventures 🌏","Almost there, my man 💪","Not yet, just a sec ⏳",
"Stay patient, love ❤️","Think a little, smarty 🤓","Waitttt… just a tiny bit 😎","Hold your excitement 😏",
"Almost, handsome 😘","3 seconds more, champ 🏆","Patience is key, my love 🔑"
];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const waitMsgEl = document.getElementById("waitMsg");
const answerBtn = document.getElementById("answerBtn");

let currentIndex = 0;
let unlocked = false;
let openedCount = 0;
let currentBox = null;
let completedBoxes = new Set();

// Create 33 grid boxes
for(let i=0;i<33;i++){
    const box=document.createElement("div");
    box.className="box";
    box.onclick=()=>openQuestion(i,box);
    grid.appendChild(box);
}

// Open question modal
function openQuestion(i,box){
    currentIndex=i;
    currentBox=box;
    box.innerText=i+1; // number appears only on click
    modal.style.display="flex";
    questionEl.innerText=questions[i];
    answerEl.innerText="";
    waitMsgEl.innerText="";
    answerBtn.style.display="block";
    unlocked=false;
    setTimeout(()=>unlocked=true,3000); // 3 sec wait
}

// Show answer logic
answerBtn.onclick=function(){
    if(!unlocked){
        waitMsgEl.innerText=waitMessages[currentIndex];
        answerBtn.style.display="none";
        setTimeout(()=>{
            answerBtn.style.display="block";
            waitMsgEl.innerText="";
        },3000);
        return;
    }

    answerEl.innerText=answers[currentIndex];
    fireworkBurst();

    if(!completedBoxes.has(currentIndex)){
        completedBoxes.add(currentIndex);
        currentBox.classList.add("completed");
        openedCount++;
    }

    // Auto-close modal after 2.5 seconds
    setTimeout(()=>{
        modal.style.display="none";
    },2500);

    // Final message automatically after 33 boxes
    if(openedCount === 33){
        setTimeout(()=>{
            modal.style.display="flex";
            modal.innerHTML = `
            <div class="finalMessage">
            Do you know why there were 33 grids?<br><br>
            Because you turn 33 this year.<br><br>
            And every single one is a reason I love you.<br><br>
            <b>Happy Birthday, my love ❤️</b>
            </div>`;
            // Multiple fireworks for effect
            for(let i=0;i<20;i++){
                setTimeout(fireworkBurst,i*300);
            }
        }, 1500);
    }
}

// Close modal when clicking outside (optional)
modal.onclick=function(e){
    if(e.target===modal){
        modal.style.display="none";
    }
}

// Fireworks canvas
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.onresize=resizeCanvas;

let particles=[];

// Firework burst
function fireworkBurst(){
    for(let i=0;i<120;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            angle:Math.random()*2*Math.PI,
            speed:Math.random()*6+2,
            radius:Math.random()*3+1,
            alpha:1
        });
    }
}

// Animate fireworks
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach((p,index)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.alpha-=0.012;
        if(p.alpha<=0) particles.splice(index,1);
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,2*Math.PI);
        ctx.fillStyle="rgba(255,215,0,"+p.alpha+")";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
