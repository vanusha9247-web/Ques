<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Grid</title>
<style>
body {margin:0;font-family:'Arial Black',Arial,sans-serif;background:linear-gradient(120deg,#0b0b12,#1a1a26);color:#fff;overflow-x:hidden;}
h1{text-align:center;margin:20px;color:#ffa500;text-shadow:2px 2px 4px #000;}
.grid-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;max-width:900px;margin:auto;padding:20px;}
.grid-item{background:#333;height:80px;display:flex;justify-content:center;align-items:center;border-radius:10px;font-weight:bold;font-size:20px;cursor:pointer;color:#ffa500;box-shadow:0 4px 8px rgba(0,0,0,0.5);transition:transform 0.2s,box-shadow 0.2s;}
.grid-item:hover{transform:scale(1.1);box-shadow:0 8px 16px rgba(0,0,0,0.7);}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);z-index:1000;}
.modal-content{background:#1f1f2f;padding:30px;border-radius:15px;text-align:center;max-width:500px;width:90%;color:#fff;position:relative;border:2px solid #ffa500;}
.question-text{font-size:20px;margin-bottom:20px;}
.answer-button{background:#ffa500;border:none;padding:12px 25px;border-radius:10px;color:#1b1b2f;font-size:18px;cursor:pointer;transition: background 0.2s;font-weight:bold;}
.answer-button:hover{background:#ffcc33;}
.early-message{font-size:18px;color:#ffa500;margin-top:10px;font-weight:bold;animation:fadeinout 2s forwards;}
@keyframes fadeinout{0%{opacity:0;transform:translateY(20px);}20%{opacity:1;transform:translateY(0);}80%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-20px);}}
#finalModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:2000;color:#ffa500;text-align:center;font-size:32px;font-weight:bold;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;}
@media (max-width:600px){
  .grid-item{height:100px;font-size:24px;}
  .modal-content{padding:20px;width:90%;font-size:18px;}
  .answer-button{padding:16px 30px;font-size:20px;}
  h1{font-size:28px;}
}
</style>
</head>
<body>
<h1>Happy Birthday, Babyyy! 🎉🎂</h1>
<div class="grid-container" id="gridContainer"></div>

<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <div class="question-text" id="questionText"></div>
        <button class="answer-button" id="answerButton">Show Answer</button>
        <div class="early-message" id="earlyMessage"></div>
    </div>
</div>
<div id="finalModal"><div>You know why 33 grids? Because you turn 33 this year! 🎉🎈<br>Happy Birthday, Babyyy! ❤️</div></div>

<canvas id="canvas"></canvas>

<script>
// 33 Jokes with emojis
const jokes=[
{q:"Why can’t skeletons fight each other? 💀", a:"They don’t have the guts. 😅💀", m:"Patience, buddy!"},
{q:"What do you call a factory that makes okay products? 🏭", a:"A satisfactory. ✅", m:"Think about it..."},
{q:"Why did the bicycle fall over? 🚲", a:"It was two-tired. 😴", m:"Slow down, man!"},
{q:"What do you call a sleeping bull? 🐂", a:"A bulldozer. 😴", m:"Chill vibes"},
{q:"Why did the stadium get hot after the game? 🏟️", a:"Because all the fans left. 💨", m:"Crowds make it hot!"},
{q:"What’s orange and sounds like a parrot? 🥕🦜", a:"A carrot. 🥕😂", m:"Veggie power!"},
{q:"Why is dark spelled with a 'k' and not a 'c'? 🌑", a:"Because you can’t see in the dark. 👀", m:"Think hard!"},
{q:"What did one wall say to the other wall? 🧱", a:"I’ll meet you at the corner. 🔲", m:"Solid teamwork!"},
{q:"What do you call a pile of cats? 🐱", a:"A meow-ntain. 🐾", m:"Purrfection"},
{q:"Why did the picture go to jail? 🖼️", a:"Because it was framed. 😎", m:"Stay sharp!"},
{q:"What do you call a sleeping pizza? 🍕", a:"A piZZZZa. 🍕💤", m:"Cheesy dreams"},
{q:"Why did the chair go to therapy? 🪑", a:"Because it had too many issues to stand up for itself. 😢", m:"Even furniture needs support"},
{q:"What is the hardest tea to swallow? 🍵", a:"Reali-Tea 😅", m:"Think, bro!"},
{q:"Why did the computer gain weight? 💻", a:"Because it accepted a lot of cookies 🍪", m:"Digital snacks!"},
{q:"Why you should never fart in an Apple store? 🍏", a:"Because there are no windows 🙊", m:"Careful now!"},
{q:"Farmer A sells corn 🌽; Farmer B sells milk 🥛; what does Farmer C sell?", a:"Farmer C sells medicines 💊", m:"Health first!"},
{q:"What did 20 do when hungry? 🔢", a:"28 (20 ate) 😆", m:"Math snack!"},
{q:"Which tea is the coldest tea ever? 🍵❄️", a:"Ooty(tea) 🥶", m:"Cool drink!"},
{q:"What do you call a tiny ocean wave? 🌊", a:"Microw-wave 😅", m:"Small but mighty"},
{q:"What do you call a door that's so cute? 🚪", a:"Adorable 😍", m:"Nice entry"},
{q:"What has two butts but kills people? 🍑💀", a:"AssAssin 😎", m:"Sneaky!"},
{q:"Why did the math book look sad? 📖", a:"It had too many problems. 😢", m:"Keep solving!"},
{q:"Why did the mango sit alone? 🥭", a:"It didn’t want to get into a pickle. 😅", m:"Solo vibes"},
{q:"Why did the chapati fail the race? 🫓", a:"It couldn’t roll fast enough. 🏃‍♂️", m:"Take it slow"},
{q:"Why did the chai break up with the coffee? ☕", a:"It was too hot to handle 🔥", m:"Hot stuff"},
{q:"Why did the jalebi get promoted? 🍯", a:"It always knew how to twist the situation. 😉", m:"Sweet twist"},
{q:"Why did the ladoo stay next to me? 🍬", a:"Because life is sweeter with you. ❤️", m:"Sweet bro"},
{q:"Why do I love Indian weddings? 💍", a:"Because every celebration reminds me of you. 🥳", m:"Party vibes!"},
{q:"What do you call a masala dosa with feelings? 🥞💖", a:"Rolling in love. 😍", m:"Spicy feelings"},
{q:"Why do ladoos never fight? 🍬", a:"Because love is sweeter than arguments. ❤️", m:"Sweet victory"},
{q:"How does a samosa apologize? 🥟", a:"I’m sorry, I was stuffed with emotions. 😅", m:"Stuffed heart"},
{q:"What do you call a biryani with attitude? 🍛😎", a:"Extra masala. 🌶️", m:"Spicy bro"},
{q:"How do idlis say 'I miss you'? 🍚", a:"By steaming quietly in your thoughts. 🥺", m:"Steamy thoughts"}
];

// Create 33 grids
const gridContainer = document.getElementById('gridContainer');
let revealedCount = 0;
jokes.forEach((joke, index)=>{
  const gridItem=document.createElement('div');
  gridItem.className='grid-item';
  gridItem.textContent=index+1;
  gridContainer.appendChild(gridItem);
  gridItem.addEventListener('click',()=>openModal(index));
});

// Modal
const modal=document.getElementById('modal');
const questionText=document.getElementById('questionText');
const answerButton=document.getElementById('answerButton');
const earlyMessage=document.getElementById('earlyMessage');
const finalModal=document.getElementById('finalModal');
let currentIndex=0, answerTimer=null;

function openModal(index){
  currentIndex=index;
  questionText.innerHTML=jokes[index].q;
  answerButton.textContent='Show Answer';
  earlyMessage.textContent='';
  modal.style.display='flex';
  startQuestionAnimation();
  let allowAnswer=false;
  clearTimeout(answerTimer);
  answerTimer=setTimeout(()=>allowAnswer=true,5000);
  answerButton.onclick=()=>{
    if(!allowAnswer){
      earlyMessage.textContent=jokes[index].m;
    }else{
      questionText.innerHTML=jokes[index].a;
      earlyMessage.textContent='';
      startAnswerAnimation();
      revealedCount++;
      if(revealedCount===jokes.length){
        setTimeout(()=>finalModal.style.display='flex',1000);
      }
    }
  };
}
modal.addEventListener('click', e=>{if(e.target===modal) modal.style.display='none';});

// Canvas Animations
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[], balloons=[];
class Particle{
  constructor(x,y,color,size,velocity,type='confetti'){this.x=x;this.y=y;this.color=color;this.size=size;this.velocity=velocity;this.type=type;this.alpha=1;}
  update(){this.x+=this.velocity.x; this.y+=this.velocity.y; this.alpha-=0.02;}
  draw(){ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.beginPath();if(this.type==='balloon'){ctx.ellipse(this.x,this.y,this.size*0.8,this.size,0,0,2*Math.PI);}else{ctx.arc(this.x,this.y,this.size,0,Math.PI*2);}ctx.fill();ctx.globalAlpha=1;}
}
function createParticles(count=100,type='confetti'){particles=[];for(let i=0;i<count;i++){let x=Math.random()*canvas.width;let y=Math.random()*canvas.height;let color=`hsl(${Math.random()*360},100%,50%)`;let size=Math.random()*6+2;let velocity={x:(Math.random()-0.5)*6,y:(Math.random()-0.5)*6};particles.push(new Particle(x,y,color,size,velocity,type));}}
function createBalloons(count=20){balloons=[];for(let i=0;i<count;i++){let x=Math.random()*canvas.width;let y=canvas.height+Math.random()*100;let color=`hsl(${Math.random()*360},80%,60%)`;let size=Math.random()*15+10;let velocity={x:0,y:-Math.random()*2-1};balloons.push(new Particle(x,y,color,size,velocity,'balloon'));}}
function animateParticles(duration=2000){let start=null;function animate(timestamp){if(!start) start=timestamp;ctx.clearRect(0,0,canvas.width,canvas.height);let elapsed=timestamp-start;particles.forEach(p=>{p.update();p.draw();});balloons.forEach(b=>{b.update();b.draw();});particles=particles.filter(p=>p.alpha>0);balloons=balloons.filter(b=>b.alpha>0 && b.y>-50);if(elapsed<duration){requestAnimationFrame(animate);}else{ctx.clearRect(0,0,canvas.width,canvas.height);}}animate();}
function startQuestionAnimation(){createParticles(80,'confetti'); createBalloons(10); animateParticles(2500);}
function startAnswerAnimation(){createParticles(150,'confetti'); createBalloons(25); animateParticles(3500);}
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>
</body>
</html>
