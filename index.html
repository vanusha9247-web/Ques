<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Grid</title>
<style>
body {
  margin:0;
  font-family:'Arial Black',Arial,sans-serif;
  background:#0b0b12;
  color:#fff;
  overflow:auto;
}
h1{
  text-align:center;
  margin:20px;
  color:#ffa500;
  text-shadow:2px 2px 4px #000;
}
.grid-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:10px;
  max-width:900px;
  margin:20px auto;
  padding:10px;
  position:relative;
  z-index:10;
}
.grid-item{
  background:#333;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
  color:#ffa500;
  box-shadow:0 4px 8px rgba(0,0,0,0.5);
  transition:transform 0.2s,box-shadow 0.2s;
  z-index:10;
}
.grid-item:hover{
  transform:scale(1.1);
  box-shadow:0 8px 16px rgba(0,0,0,0.7);
}
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  z-index:1000;
  overflow:auto;
}
.modal-content{
  background:#1f1f2f;
  padding:30px;
  border-radius:15px;
  text-align:center;
  max-width:500px;
  width:90%;
  color:#fff;
  position:relative;
  border:2px solid #ffa500;
}
.question-text{
  font-size:20px;
  margin-bottom:20px;
}
.answer-button{
  background:#ffa500;
  border:none;
  padding:12px 25px;
  border-radius:10px;
  color:#1b1b2f;
  font-size:18px;
  cursor:pointer;
  transition: background 0.2s;
  font-weight:bold;
}
.answer-button:hover{background:#ffcc33;}
.early-message{
  font-size:18px;
  color:#ffa500;
  margin-top:10px;
  font-weight:bold;
  animation:fadeinout 2s forwards;
}
@keyframes fadeinout{
  0%{opacity:0;transform:translateY(20px);}
  20%{opacity:1;transform:translateY(0);}
  80%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-20px);}
}
#finalModal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
  color:#ffa500;
  text-align:center;
  font-size:32px;
  font-weight:bold;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
  z-index:3000;
}
@media (max-width:600px){
  .grid-item{height:100px;font-size:24px;}
  .modal-content{padding:20px;width:90%;font-size:18px;}
  .answer-button{padding:16px 30px;font-size:20px;}
  h1{font-size:28px;}
}
</style>
</head>
<body>
<h1>Happy Birthday, Babyyy! 🎉🎂</h1>
<div class="grid-container" id="gridContainer"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <div class="question-text" id="questionText"></div>
    <button class="answer-button" id="answerButton">Show Answer</button>
    <div class="early-message" id="earlyMessage"></div>
  </div>
</div>

<div id="finalModal">
  <div>You know why 33 grids? Because you turn 33 this year! 🎉🎈<br>Happy Birthday, Babyyy! ❤️</div>
</div>

<canvas id="canvas"></canvas>
