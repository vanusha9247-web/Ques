<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Grid</title>
<style>
body {margin:0;font-family:'Arial Black',Arial,sans-serif;background:linear-gradient(120deg,#0b0b12,#1a1a26);color:#fff;overflow-x:hidden;}
h1{text-align:center;margin:20px;color:#ffa500;text-shadow:2px 2px 4px #000;}
.grid-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;max-width:900px;margin:auto;padding:20px;}
.grid-item{background:#333;height:80px;display:flex;justify-content:center;align-items:center;border-radius:10px;font-weight:bold;font-size:20px;cursor:pointer;color:#ffa500;box-shadow:0 4px 8px rgba(0,0,0,0.5);transition:transform 0.2s,box-shadow 0.2s;}
.grid-item:hover{transform:scale(1.1);box-shadow:0 8px 16px rgba(0,0,0,0.7);}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);z-index:1000;}
.modal-content{background:#1f1f2f;padding:30px;border-radius:15px;text-align:center;max-width:500px;width:90%;color:#fff;position:relative;border:2px solid #ffa500;}
.question-text{font-size:20px;margin-bottom:20px;}
.answer-button{background:#ffa500;border:none;padding:12px 25px;border-radius:10px;color:#1b1b2f;font-size:18px;cursor:pointer;transition: background 0.2s;font-weight:bold;}
.answer-button:hover{background:#ffcc33;}
.early-message{font-size:18px;color:#ffa500;margin-top:10px;font-weight:bold;animation:fadeinout 2s forwards;}
@keyframes fadeinout{0%{opacity:0;transform:translateY(20px);}20%{opacity:1;transform:translateY(0);}80%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-20px);}}
#finalModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:2000;color:#ffa500;text-align:center;font-size:32px;font-weight:bold;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:3000;}
@media (max-width:600px){
  .grid-item{height:100px;font-size:24px;}
  .modal-content{padding:20px;width:90%;font-size:18px;}
  .answer-button{padding:16px 30px;font-size:20px;}
  h1{font-size:28px;}
}
</style>
</head>
<body>
<h1>Happy Birthday, Babyyy!</h1>
<div class="grid-container" id="gridContainer"></div>

<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <div class="question-text" id="questionText"></div>
        <button class="answer-button" id="answerButton">Show Answer</button>
        <div class="early-message" id="earlyMessage"></div>
    </div>
</div>
<div id="finalModal"><div>You know why 33 grids? Because you turn 33 this year!<br>Happy Birthday, Babyyy!</div></div>

<canvas id="canvas"></canvas>

<script>
// Complete 33 jokes
const jokes=[
{q:"Why can’t skeletons fight each other?", a:"They don’t have the guts.", m:"Patience, buddy!"},
{q:"What do you call a factory that makes okay products?", a:"A satisfactory.", m:"Think about it..."},
{q:"Why did the bicycle fall over?", a:"It was two-tired.", m:"Slow down, man!"},
{q:"What do you call a sleeping bull?", a:"A bulldozer.", m:"Chill vibes"},
{q:"Why did the stadium get hot after the game?", a:"Because all the fans left.", m:"Crowds make it hot!"},
{q:"What’s orange and sounds like a parrot?", a:"A carrot.", m:"Veggie power!"},
{q:"Why is dark spelled with a 'k' and not a 'c'?", a:"Because you can’t see in the dark.", m:"Think hard!"},
{q:"What did one wall say to the other wall?", a:"I’ll meet you at the corner.", m:"Solid teamwork!"},
{q:"What do you call a pile of cats?", a:"A meow-ntain.", m:"Purrfection"},
{q:"Why did the picture go to jail?", a:"Because it was framed.", m:"Stay sharp!"},
{q:"What do you call a sleeping pizza?", a:"A piZZZZa.", m:"Cheesy dreams"},
{q:"Why did the chair go to therapy?", a:"Because it had too many issues to stand up for itself.", m:"Even furniture needs support"},
{q:"What is the hardest tea to swallow?", a:"Reali-Tea", m:"Think, bro!"},
{q:"Why did the computer gain weight?", a:"Because it accepted a lot of cookies", m:"Digital snacks!"},
{q:"Why you should never fart in an Apple store?", a:"Because there are no windows", m:"Careful now!"},
{q:"Farmer A: sells corn; Farmer B: sells milk; what does Farmer C sell?", a:"Farmer C sells medicines", m:"Health first!"},
{q:"What did 20 do when hungry?", a:"28 (20 ate)", m:"Math snack!"},
{q:"Which tea is the coldest tea ever?", a:"Ooty(tea)", m:"Cool drink!"},
{q:"What do you call a tiny ocean wave?", a:"Microw-wave", m:"Small but mighty"},
{q:"What do you call a door that's so cute?", a:"Adorable", m:"Nice entry"},
{q:"What has two butts but kills people?", a:"AssAssin", m:"Sneaky!"},
{q:"Why did the math book look sad?", a:"It had too many problems.", m:"Keep solving!"},
{q:"Why did the mango sit alone?", a:"It didn’t want to get into a pickle.", m:"Solo vibes"},
{q:"Why did the chapati fail the race?", a:"It couldn’t roll fast enough.", m:"Take it slow"},
{q:"Why did the chai break up with the coffee?", a:"It was too hot to handle", m:"Hot stuff"},
{q:"Why did the jalebi get promoted?", a:"It always knew how to twist the situation.", m:"Sweet twist"},
{q:"Why did the ladoo stay next to me?", a:"Because life is sweeter with you.", m:"Sweet bro"},
{q:"Why do I love Indian weddings?", a:"Because every celebration reminds me of you.", m:"Party vibes!"},
{q:"What do you call a masala dosa with feelings?", a:"Rolling in love.", m:"Spicy feelings"},
{q:"Why do ladoos never fight?", a:"Because love is sweeter than arguments.", m:"Sweet victory"},
{q:"How does a samosa apologize?", a:"I’m sorry, I was stuffed with emotions.", m:"Stuffed heart"},
{q:"What do you call a biryani with attitude?", a:"Extra masala.", m:"Spicy bro"},
{q:"How do idlis say 'I miss you'?", a:"By steaming quietly in your thoughts.", m:"Steamy thoughts"}
];

// Grid
const gridContainer=document.getElementById('gridContainer');
let revealedCount=0;
jokes.forEach((j,idx)=>{
    const div=document.createElement('div');
    div.className='grid-item';
    div.textContent=idx+1;
    div.addEventListener('click',()=>openModal(idx));
    gridContainer.appendChild(div);
});

// Modal
const modal=document.getElementById('modal');
const modalContent=document.getElementById('modalContent');
const questionText=document.getElementById('questionText');
const answerButton=document.getElementById('answerButton');
const earlyMessage=document.getElementById('earlyMessage');
const finalModal=document.getElementById('finalModal');
let selectedIndex=0;
let timerRunning=false;

// Canvas
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
const fireworkColors=["#FFA500","#FFD700","#FF4500","#FFFFFF"];

// Web Audio
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playFireworkSound(){const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.type='square';osc.frequency.setValueAtTime(Math.random()*300+200,audioCtx.currentTime);gain.gain.setValueAtTime(0.3,audioCtx.currentTime);osc.connect(gain).connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.15);}
function playBalloonSound(){const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.type='sine';osc.frequency.setValueAtTime(200,audioCtx.currentTime);gain.gain.setValueAtTime(0.15,audioCtx.currentTime);osc.connect(gain).connect(audioCtx.destination);osc.start();osc.frequency.linearRampToValueAtTime(100,audioCtx.currentTime+0.5);osc.stop(audioCtx.currentTime+0.5);}
function playBirthdayJingle(){const notes=[261.63,293.66,329.63,349.23];notes.forEach((freq,i)=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.type='triangle';osc.frequency.setValueAtTime(freq,audioCtx.currentTime+i*0.3);gain.gain.setValueAtTime(0.25,audioCtx.currentTime+i*0.3);osc.connect(gain).connect(audioCtx.destination);osc.start(audioCtx.currentTime+i*0.3);osc.stop(audioCtx.currentTime+i*0.3+0.25);});}

// Modal logic
function openModal(idx){selectedIndex=idx;questionText.textContent=jokes[idx].q;earlyMessage.textContent='';modal.style.display='flex';answerButton.disabled=false;timerRunning=false;}
modal.addEventListener('click',(e)=>{if(e.target===modal) modal.style.display='none';});
answerButton.addEventListener('click',()=>{
    if(!timerRunning){timerRunning=true;earlyMessage.textContent="Hold on man..."; startEarlyAnimation(); setTimeout(showAnswer,5000);}
    else{earlyMessage.textContent=jokes[selectedIndex].m; startEarlyAnimation();}
});
function showAnswer(){earlyMessage.textContent='';questionText.textContent=jokes[selectedIndex].a; startCelebrationAnimation(); revealedCount++; if(revealedCount===jokes.length){setTimeout(showFinalCelebration,2500);}}

// Touch fireworks
canvas.addEventListener('touchstart',function(e){const touch=e.touches[0]; createFireworkAt(touch.clientX,touch.clientY);},false);
function createFireworkAt(x,y){for(let i=0;i<50;i++){const angle=Math.random()*2*Math.PI;const speed=Math.random()*4+2;particles.push({x:x,y:y,dx:Math.cos(angle)*speed,dy:Math.sin(angle)*speed,size:Math.random()*5+5,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)]});} playFireworkSound();}

// Particles
function startEarlyAnimation(){particles=[];playFireworkSound();for(let i=0;i<40;i++){particles.push({x:Math.random()*canvas.width,y:canvas.height,size:Math.random()*7+5,dx:(Math.random()*2-1),dy:-Math.random()*3-2,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)]});}animateParticles(60);}
function startCelebrationAnimation(){particles=[]; const rect=modalContent.getBoundingClientRect(); const centerX=rect.left+rect.width/2; const centerY=rect.top+rect.height/2; playFireworkSound(); playBalloonSound(); for(let i=0;i<100;i++){const angle=Math.random()*2*Math.PI;const speed=Math.random()*4+2;particles.push({x:centerX,y:centerY,dx:Math.cos(angle)*speed,dy:Math.sin(angle)*speed,size:Math.random()*5+5,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)]});}for(let i=0;i<20;i++){particles.push({x:Math.random()*(canvas.width-100)+50,y:canvas.height,dx:Math.sin(Math.random()*2*Math.PI)*0.3,dy:-Math.random()*1.5-0.5,size:Math.random()*10+15,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)],type:'balloon'});}animateParticles(200);}
function showFinalCelebration(){finalModal.style.display='flex';playBirthdayJingle();particles=[];for(let i=0;i<300;i++){const angle=Math.random()*2*Math.PI;const speed=Math.random()*6+2;particles.push({x:Math.random()*(canvas.width-200)+100,y:Math.random()*(canvas.height-200)+100,dx:Math.cos(angle)*speed,dy:Math.sin(angle)*speed,size:Math.random()*8+4,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)]});}for(let i=0;i<50;i++){particles.push({x:Math.random()*(canvas.width-100)+50,y:canvas.height+Math.random()*150,dx:Math.sin(Math.random()*2*Math.PI)*0.5,dy:-Math.random()*2-1,size:Math.random()*10+15,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)],type:'balloon'});}for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*-canvas.height,dx:Math.random()*2-1,dy:Math.random()*3+2,size:Math.random()*10+6,color:fireworkColors[Math.floor(Math.random()*fireworkColors.length)],type:'confetti'});}animateParticles(500);}

function animateParticles(frames){let count=0;function frame(){ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=p.color;ctx.beginPath();if(p.type==='balloon'){ctx.ellipse(p.x,p.y,p.size,p.size*1.2,0,0,2*Math.PI);}else if(p.type==='confetti'){ctx.fillRect(p.x,p.y,p.size*1.5,p.size*0.8);}else{ctx.arc(p.x,p.y,p.size,0,Math.PI*2);}ctx.fill();p.x+=p.dx;p.y+=p.dy;});count++;if(count<frames)requestAnimationFrame(frame);}frame();}
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>
</body>
</html>
