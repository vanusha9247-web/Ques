<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Grid</title>
<style>
body {
    margin:0;
    font-family:'Arial', sans-serif;
    background: linear-gradient(120deg,#ffe6f0,#fff6cc);
    overflow-x:hidden;
}
h1 { text-align:center; margin:20px; color:#ff4d6d; }
.grid-container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(80px,1fr));
    gap:10px;
    max-width:800px;
    margin:auto;
    padding:20px;
}
.grid-item {
    background:#ffb3c6;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    font-weight:bold;
    font-size:20px;
    cursor:pointer;
    color:white;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
}
.grid-item:hover {
    transform:scale(1.1);
    box-shadow:0 8px 16px rgba(0,0,0,0.3);
}

/* Modal */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background: rgba(0,0,0,0.7);
    z-index:1000;
}
.modal-content {
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    max-width:500px;
    width:90%;
    position:relative;
}
.question-text { font-size:20px; margin-bottom:20px; }
.answer-button {
    background:#ff4d6d;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition: background 0.2s;
}
.answer-button:hover { background:#ff1a4d; }
.early-message {
    font-size:18px;
    color:#ff4d6d;
    margin-top:10px;
    font-weight:bold;
    animation: fadeinout 2s forwards;
}
@keyframes fadeinout {
    0% {opacity:0; transform: translateY(20px);}
    20% {opacity:1; transform: translateY(0);}
    80% {opacity:1; transform: translateY(0);}
    100% {opacity:0; transform: translateY(-20px);}
}

/* Final Modal */
#finalModal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
    color:white;
    text-align:center;
    font-size:28px;
}
</style>
</head>
<body>
<h1>Happy Birthday, Babyyy!</h1>
<div class="grid-container" id="gridContainer"></div>

<!-- Question Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <div class="question-text" id="questionText"></div>
        <button class="answer-button" id="answerButton">Show Answer</button>
        <div class="early-message" id="earlyMessage"></div>
    </div>
</div>

<!-- Final Modal -->
<div id="finalModal">
    <div>🎉 You know baby… why 33 grids?<br>
    Because you turn 33 this year!<br>
    Happy Birthday, Babyyy! 💖🎂✨</div>
</div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<script>
// Jokes array
const jokes=[
{q:"Why can’t skeletons fight each other?", a:"They don’t have the guts.", m:"Bones need courage first!"},
{q:"What do you call a factory that makes okay products?", a:"A satisfactory.", m:"Patience baby!"},
{q:"Why did the bicycle fall over?", a:"It was two-tired.", m:"Think twice love!"},
{q:"What do you call a sleeping bull?", a:"A bulldozer.", m:"Zzz… strong dreams!"},
{q:"Why did the stadium get hot after the game?", a:"Because all the fans left.", m:"Missing fans like hugs!"},
{q:"What’s orange and sounds like a parrot?", a:"A carrot.", m:"Veggies can be funny too!"},
{q:"Why is dark spelled with a 'k' and not a 'c'?", a:"Because you can’t see in the dark.", m:"Think baby…"},
{q:"What did one wall say to the other wall?", a:"I’ll meet you at the corner.", m:"Corners can be romantic!"},
{q:"What do you call a pile of cats?", a:"A meow-ntain.", m:"Cat cuddles incoming!"},
{q:"Why did the picture go to jail?", a:"Because it was framed.", m:"Stay outta trouble!"},
{q:"What do you call a sleeping pizza?", a:"A piZZZZa.", m:"Dreamy pizza vibes"},
{q:"Why did the chair go to therapy?", a:"Because it had too many issues to stand up for itself.", m:"Even chairs need love"},
{q:"What is the hardest tea to swallow?", a:"Reali-Tea", m:"Think sweet baby"},
{q:"Why did the computer gain weight?", a:"Because it accepted a lot of cookies", m:"Careful with cookies!"},
{q:"Why you should never fart in an Apple store?", a:"Because there are no windows", m:"Think before acting"},
{q:"Farmer A: sells corn; Farmer B: sells milk; what does Farmer C sell?", a:"Farmer C sells medicines", m:"Healthy love first"},
{q:"What did 20 do when hungry?", a:"28 (20 ate)", m:"Math is tasty!"},
{q:"Which tea is the coldest tea ever?", a:"Ooty(tea)", m:"Cool thoughts"},
{q:"What do you call a tiny ocean wave?", a:"Microw-wave", m:"Little but mighty"},
{q:"What do you call a door that's so cute?", a:"Adorable", m:"Door to my heart"},
{q:"What has two butts but kills people?", a:"AssAssin", m:"Be sneaky love"},
{q:"Why did the math book look sad?", a:"It had too many problems.", m:"But we solve them together"},
{q:"Why did the mango sit alone?", a:"It didn’t want to get into a pickle.", m:"Sweet alone, sweeter together"},
{q:"Why did the chapati fail the race?", a:"It couldn’t roll fast enough.", m:"Take your time love"},
{q:"Why did the chai break up with the coffee?", a:"It was too hot to handle", m:"Spicy love"},
{q:"Why did the jalebi get promoted?", a:"It always knew how to twist the situation.", m:"Twist of love!"},
{q:"Why did the ladoo stay next to me?", a:"Because life is sweeter with you.", m:"Sweet baby"},
{q:"Why do I love Indian weddings?", a:"Because every celebration reminds me of you.", m:"Love in every moment"},
{q:"What do you call a masala dosa with feelings?", a:"Rolling in love.", m:"Flavors of love"},
{q:"Why do ladoos never fight?", a:"Because love is sweeter than arguments.", m:"Sweetness wins always"},
{q:"How does a samosa apologize?", a:"I’m sorry, I was stuffed with emotions.", m:"Soft hearts"},
{q:"What do you call a biryani with attitude?", a:"Extra masala.", m:"Spicy attitude"},
{q:"How do idlis say 'I miss you'?", a:"By steaming quietly in your thoughts.", m:"Steamy love"}
];

// Grid generation
const gridContainer=document.getElementById('gridContainer');
jokes.forEach((j,idx)=>{
    const div=document.createElement('div');
    div.className='grid-item';
    div.textContent=idx+1;
    div.addEventListener('click',()=>openModal(idx));
    gridContainer.appendChild(div);
});

// Modal logic
const modal=document.getElementById('modal');
const questionText=document.getElementById('questionText');
const answerButton=document.getElementById('answerButton');
const earlyMessage=document.getElementById('earlyMessage');
const finalModal=document.getElementById('finalModal');
let selectedIndex=0;
let timerRunning=false;

function openModal(idx){
    selectedIndex=idx;
    questionText.textContent=jokes[idx].q;
    earlyMessage.textContent='';
    modal.style.display='flex';
    answerButton.disabled=false;
    timerRunning=false;
}

// Close modal on background click
modal.addEventListener('click',(e)=>{
    if(e.target===modal) modal.style.display='none';
});

// Answer button
answerButton.addEventListener('click',()=>{
    if(!timerRunning){
        timerRunning=true;
        earlyMessage.textContent="Wait a bit baby!";
        startEarlyAnimation();
        setTimeout(showAnswer,5000);
    }else{
        earlyMessage.textContent=jokes[selectedIndex].m;
        startEarlyAnimation();
    }
});

function showAnswer(){
    earlyMessage.textContent='';
    questionText.textContent=jokes[selectedIndex].a;
    startCelebrationAnimation();
}

// Canvas animations
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];

// Utils
function random(min,max){return Math.random()*(max-min)+min;}

// Early-click animation: small hearts/confetti
function startEarlyAnimation(){
    particles=[];
    for(let i=0;i<40;i++){
        particles.push({
            x:random(0,canvas.width),
            y:canvas.height,
            size:random(5,10),
            speed:random(1,3),
            dx:random(-1,1),
            dy: -random(2,4),
            type:Math.random()<0.5?'heart':'confetti'
        });
    }
    animateParticles(60);
}

// Celebration animation: fireworks + balloons
function startCelebrationAnimation(){
    particles=[];
    for(let i=0;i<100;i++){
        const angle=random(0,2*Math.PI);
        const speed=random(2,6);
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            size:random(5,8),
            dx:Math.cos(angle)*speed,
            dy:Math.sin(angle)*speed,
            color:`hsl(${random(0,360)},80%,60%)`,
            type:'firework'
        });
    }
    animateParticles(120);
}

// Particle animator
function animateParticles(frames){
    let count=0;
    function frame(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{
            if(p.type==='heart'){
                ctx.fillStyle='red';
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                ctx.fill();
            }else if(p.type==='confetti'){
                ctx.fillStyle=`hsl(${random(0,360)},80%,60%)`;
                ctx.fillRect(p.x,p.y,p.size,2);
            }else if(p.type==='firework'){
                ctx.fillStyle=p.color;
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                ctx.fill();
            }
            p.x+=p.dx; p.y+=p.dy;
        });
        count++;
        if(count<frames) requestAnimationFrame(frame);
    }
    frame();
}

window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>
</body>
</html>
